apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: groups.k8sio.auth
  labels:
    app.kubernetes.io/part-of: k8s-iam-operator
spec:
  group: k8sio.auth
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              description: The specification of the Group.
              type: object
              properties:
                CRoles:
                  description: List of ClusterRole bindings for the group
                  type: array
                  items:
                    type: object
                    properties:
                      namespace:
                        description: Namespace where the binding applies (omit for cluster-wide)
                        type: string
                        minLength: 1
                        maxLength: 63
                      clusterRole:
                        description: Name of the ClusterRole to bind
                        type: string
                        minLength: 1
                        maxLength: 253
                Roles:
                  description: List of Role names to bind in the group's namespace
                  type: array
                  items:
                    type: string
                    minLength: 1
                    maxLength: 253
      additionalPrinterColumns:
        - name: Roles
          type: integer
          jsonPath: .spec.CRoles
          description: Number of cluster role bindings
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    kind: Group
    listKind: GroupList
    plural: groups
    singular: group
    categories:
      - idp
      - iam
    shortNames:
      - grp
