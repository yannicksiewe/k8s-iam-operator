# Default values for k8s-iam-operator
# This is a YAML-formatted file.

# Number of replicas
replicaCount: 1

image:
  repository: quay.io/yannick_siewe/k8s-iam-operator
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Operator configuration
config:
  # CRD group name
  groupName: "k8sio.auth"
  # CRD version
  version: "v1"
  # Log level (DEBUG, INFO, WARNING, ERROR)
  logLevel: "INFO"

# OpenTelemetry tracing configuration
tracing:
  enabled: false
  # OTLP endpoint for tracing
  endpoint: "http://tempo.monitoring:4317/"

# Audit logging configuration
audit:
  enabled: true

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  targetPort: 8081

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Network Policy
networkPolicy:
  enabled: false
  # Additional ingress rules
  additionalIngress: []
  # Additional egress rules
  additionalEgress: []

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: false
  # Additional labels for the ServiceMonitor
  additionalLabels: {}
  # Scrape interval
  interval: 30s
  # Scrape timeout
  scrapeTimeout: 10s
  # Path for metrics endpoint
  path: /actuator/metrics

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  # Scaling behavior configuration
  behavior: {}
  # scaleDown:
  #   stabilizationWindowSeconds: 300
  #   policies:
  #   - type: Percent
  #     value: 10
  #     periodSeconds: 60
  # scaleUp:
  #   stabilizationWindowSeconds: 0
  #   policies:
  #   - type: Percent
  #     value: 100
  #     periodSeconds: 15

# PrometheusRule for alerting
prometheusRule:
  enabled: false
  # Additional labels for the PrometheusRule
  additionalLabels: {}
  # Labels to add to all alerts
  alertLabels: {}
  # Base URL for runbook links
  runbookUrl: "https://github.com/yannick-siewe/k8s-iam-operator/blob/main/docs/runbooks"
  # Additional alerting rules
  additionalRules: []
  # - alert: CustomAlert
  #   expr: some_metric > threshold
  #   for: 5m
  #   labels:
  #     severity: warning
  #   annotations:
  #     summary: "Custom alert triggered"

# Grafana Dashboard ConfigMap
grafanaDashboard:
  enabled: false
  # Namespace to create the ConfigMap in (default: release namespace)
  namespace: ""
  # Additional labels for the ConfigMap
  labels: {}
  # Annotations for the ConfigMap
  annotations: {}

# Create namespace with Pod Security Standards labels
createNamespace: false
# Additional labels for the namespace
namespaceLabels: {}
# Annotations for the namespace
namespaceAnnotations: {}

# Extra environment variables
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []
