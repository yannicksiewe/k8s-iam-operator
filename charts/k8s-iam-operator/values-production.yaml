# Production values for k8s-iam-operator
# This file contains recommended settings for production deployments

replicaCount: 2

image:
  pullPolicy: Always

config:
  logLevel: "INFO"

tracing:
  enabled: true
  endpoint: "http://tempo.monitoring:4317/"

audit:
  enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 30s

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: k8s-iam-operator
          topologyKey: kubernetes.io/hostname

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# Enable HPA for production workloads
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

# Enable PrometheusRule for alerting
prometheusRule:
  enabled: true
  additionalLabels:
    release: prometheus
  alertLabels:
    team: platform
  runbookUrl: "https://github.com/yannick-siewe/k8s-iam-operator/blob/main/docs/runbooks"

# Enable Grafana dashboard
grafanaDashboard:
  enabled: true
  labels:
    grafana_dashboard: "1"
